# Render blueprint for the kyrc leaderboard API.
#
# Render reads this at the repo root when you deploy via "New → Blueprint".
# We build with the NATIVE Go runtime from rootDir: server. The server module
# has `replace github.com/abh1nav9/kyrc => ../`, which resolves to the repo
# root (present in the checkout), so building from server/ works.
#
# Set DATABASE_URL and CORS_ORIGIN as secrets in the Render dashboard.
services:
  - type: web
    name: kyrc-leaderboard
    runtime: go
    rootDir: server            # build the server module, not the repo root
    buildCommand: go build -o app .
    startCommand: ./app
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false            # set in dashboard; never in the repo
      - key: CORS_ORIGIN
        sync: false            # your site origin, or * to start
      - key: PORT
        value: "8080"
