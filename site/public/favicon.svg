<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified stopwatch, tuned for legibility at 16-32px favicon sizes:
       thick strokes, a dark disc so the yellow reads on light browser tabs,
       and only the essential parts (body, top button/stem, one hand). -->
  <rect width="512" height="512" rx="112" fill="#14171c"/>
  <g fill="none" stroke="#ffde05" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <!-- watch body -->
    <circle cx="256" cy="300" r="150"/>
    <!-- top stem + button -->
    <line x1="256" y1="150" x2="256" y2="96"/>
    <line x1="212" y1="96" x2="300" y2="96"/>
    <!-- side winder -->
    <line x1="372" y1="176" x2="404" y2="144"/>
    <!-- single hand pointing up-right -->
    <line x1="256" y1="300" x2="322" y2="234"/>
  </g>
  <circle cx="256" cy="300" r="20" fill="#ffde05"/>
</svg>
