# Release kyrc on a version tag — one tag fans out to every native installer.
#
#   git tag v0.1.3 && git push origin v0.1.3
#
# GoReleaser builds the static-binary matrix (the tag drives `kyrc --version`
# via ldflags) and publishes to: GitHub Release (archives + deb/rpm files),
# Homebrew tap, Scoop bucket, WinGet (PR to microsoft/winget-pkgs), AUR, and
# the Snap Store. The npm packages are staged from the same build and
# published (platform packages first, then the meta-package). A second job
# then builds signed APT/RPM repositories and publishes them to GitHub Pages
# so `apt install` / `dnf install` work.
#
# One-time secret setup (Settings → Secrets and variables → Actions):
#   NPM_TOKEN                    npm "Automation" token (bypasses 2FA), @kyrc
#   HOMEBREW_TAP_TOKEN           PAT with contents:write on abh1nav9/homebrew-tap
#   SCOOP_BUCKET_TOKEN           PAT with contents:write on abh1nav9/scoop-bucket
#   WINGET_TOKEN                 PAT with contents:write on abh1nav9/winget-pkgs fork
#   AUR_KEY                      SSH private key registered with your AUR account
#   SNAPCRAFT_STORE_CREDENTIALS  output of `snapcraft export-login`
#   GPG_PRIVATE_KEY              ASCII-armored private key for signing apt/rpm repos
#   GPG_PASSPHRASE               passphrase for that key (empty string if none)
# Also: enable GitHub Pages for this repo, source = "gh-pages" branch.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # GoReleaser creates the GitHub Release; Pages job pushes gh-pages

jobs:
  release:
    runs-on: ubuntu-latest
    # The publish tokens (HOMEBREW_TAP_TOKEN, etc.) and GPG key are stored as
    # *environment* secrets under the "Production" environment, so the job
    # must opt into that environment to read them. Without this line,
    # ${{ secrets.* }} resolves to empty and every publish 401s.
    environment: Production
    # Expose whether GPG signing succeeded, so the apt/rpm job only runs when
    # there's actually a usable signing key.
    outputs:
      gpg_ready: ${{ steps.import_gpg.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Snap is optional: only build/publish it when store credentials are
      # present. Until then the snapcraft pipe is skipped so a release still
      # succeeds without a Snap Store account.
      - name: Decide snap
        id: snap
        run: |
          if [ -n "${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SNAPCRAFT_STORE_CREDENTIALS not set — skipping Snap."
          fi

      # snapcraft only needs to be on PATH when we're actually building a snap.
      - name: Install snapcraft
        if: steps.snap.outputs.enabled == 'true'
        run: sudo snap install snapcraft --classic

      # apt/dnf signing is optional: only when a GPG key is provided. A bad or
      # missing key must never block the core installers, so this is gated on
      # the secret AND marked continue-on-error.
      - name: Decide GPG
        id: gpg
        env:
          RAW_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GPG_PRIVATE_KEY not set — apt/dnf repo signing skipped."
          fi
          # Trim whitespace so a secret set to " " (a space) counts as empty.
          # A passphrase-less key must get an empty passphrase, not " ".
          TRIMMED="$(printf '%s' "$RAW_PASSPHRASE" | tr -d '[:space:]')"
          echo "passphrase=$TRIMMED" >> "$GITHUB_OUTPUT"

      # Import the signing key so the apt/rpm repos (built in the pages job)
      # can be signed. continue-on-error: a malformed key degrades to
      # "no apt/dnf" rather than failing the whole release.
      #
      # NOTE: `passphrase:` is only passed when GPG_PASSPHRASE is non-empty.
      # For a passphrase-less key, passing an (empty/whitespace) passphrase
      # makes the action's test-unlock fail — so we omit it entirely instead.
      - name: Import GPG key
        id: import_gpg
        if: steps.gpg.outputs.enabled == 'true'
        continue-on-error: true
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ steps.gpg.outputs.passphrase }}

      # Build the whole matrix + publish to every installer channel. Each
      # Sanitize + preflight the publish tokens. Trailing whitespace/newlines
      # in a secret produce a malformed auth header → "401 Bad credentials"
      # in CI while the same token works locally. We strip whitespace, export
      # the clean value, and actively test each token against its repo so a
      # bad one fails HERE with a clear message (not a generic GoReleaser 401).
      - name: Preflight publish tokens
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          fail=0
          check() {
            name="$1"; raw="$2"; repo="$3"
            clean="$(printf '%s' "$raw" | tr -d '[:space:]')"
            if [ -z "$clean" ]; then
              echo "::error::$name is empty"; fail=1; return
            fi
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: token $clean" \
              "https://api.github.com/repos/abh1nav9/$repo")
            if [ "$code" = "200" ]; then
              echo "$name → abh1nav9/$repo: OK ($code)"
              echo "$name=$clean" >> "$GITHUB_ENV"
            else
              echo "::error::$name failed on abh1nav9/$repo (HTTP $code). Token is invalid, lacks repo scope, or (if SSO) is not authorized."
              fail=1
            fi
          }
          check HOMEBREW_TAP_TOKEN "$HOMEBREW_TAP_TOKEN" homebrew-tap
          check SCOOP_BUCKET_TOKEN "$SCOOP_BUCKET_TOKEN" scoop-bucket
          check WINGET_TOKEN       "$WINGET_TOKEN"       winget-pkgs
          [ "$fail" = "0" ] || { echo "One or more publish tokens are invalid — see errors above."; exit 1; }

      # block reads the token it needs from env; a missing optional secret
      # only fails that one channel. Snap is skipped unless enabled above.
      # Tokens come from $GITHUB_ENV (sanitized by the preflight step above).
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> 2"
          args: >-
            release --clean
            ${{ steps.snap.outputs.enabled == 'true' && ' ' || '--skip=snapcraft' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AUR_KEY omitted — AUR channel disabled (registration shut down).
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      # Keep the built deb/rpm files for the apt/rpm pages job.
      - name: Upload linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 1

      # ---- npm (unchanged) -------------------------------------------------
      - name: Stage npm packages
        env:
          KYRC_VERSION: ${{ github.ref_name }}
        run: |
          node npm/scripts/build-packages.js
          node npm/scripts/sync-meta-version.js

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in npm/packages/*/; do
            ( cd "$d" && npm publish --access public )
          done

      - name: Publish meta-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/kyrc && npm publish --access public

  # ---------------------------------------------------------------------------
  # Build signed APT + RPM repositories and publish them to GitHub Pages, so
  # users can `apt install kyrc` / `dnf install kyrc` after adding the repo.
  # Runs after `release` so the deb/rpm artifacts exist. Accumulates onto the
  # existing gh-pages content so older versions stay installable.
  # ---------------------------------------------------------------------------
  apt-rpm-repo:
    needs: release
    # Only build the signed apt/dnf repos when the release job actually
    # imported a usable GPG key. No key → no apt/dnf, but the release still
    # succeeds for every other channel.
    if: needs.release.outputs.gpg_ready == 'true'
    runs-on: ubuntu-latest
    # GPG_PRIVATE_KEY / GPG_PASSPHRASE live in the Production environment too.
    environment: Production
    steps:
      - name: Install repo tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro createrepo-c gnupg

      # Pull down the current gh-pages so we append rather than clobber.
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
        continue-on-error: true

      - name: Ensure pages tree exists
        run: mkdir -p pages/deb pages/rpm

      - name: Download linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: incoming

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          echo "GPG_KEYID=$KEYID" >> "$GITHUB_ENV"
          # Export the public key so users can trust the repo.
          gpg --armor --export "$KEYID" > pages/kyrc.gpg.key

      # ---- APT repo via reprepro ------------------------------------------
      - name: Build APT repo
        env:
          GPG_KEYID: ${{ env.GPG_KEYID }}
        run: |
          mkdir -p pages/deb/conf
          cat > pages/deb/conf/distributions <<EOF
          Origin: kyrc
          Label: kyrc
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: kyrc apt repository
          SignWith: ${GPG_KEYID}
          EOF
          for f in incoming/*.deb; do
            reprepro -b pages/deb includedeb stable "$f"
          done

      # ---- RPM repo via createrepo_c --------------------------------------
      - name: Build RPM repo
        env:
          GPG_KEYID: ${{ env.GPG_KEYID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cp incoming/*.rpm pages/rpm/
          createrepo_c --update pages/rpm
          # Trim whitespace so a " " passphrase secret counts as empty.
          PASS="$(printf '%s' "$GPG_PASSPHRASE" | tr -d '[:space:]')"
          # Sign the repomd so dnf can verify the repository metadata.
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$PASS" \
              --local-user "$GPG_KEYID" \
              --detach-sign --armor pages/rpm/repodata/repomd.xml

      # Install landing page ships as a static file in the repo, so we need
      # the repo checked out to copy it. (The gh-pages checkout above is a
      # different ref; grab the tag's tree here.)
      - name: Checkout source for landing page
        uses: actions/checkout@v4
        with:
          path: src
      - name: Write install landing page
        run: cp src/.github/pages/index.html pages/index.html

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
          keep_files: true
